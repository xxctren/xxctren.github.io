<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人网站</title>
    <style>
        :root {
            font-family: Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            font-weight: 400;
            color-scheme: light dark;
            color: rgba(255, 255, 255, 0.87);
            background-color: #242424;
            font-synthesis: none;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            min-width: 320px;
            min-height: 100vh;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 导航栏 */
        .navbar {
            background-color: #1a1a1a;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            margin: 0;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #646cff;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #fff;
            padding: 0;
        }

        /* 英雄区域 */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 6rem 0;
            text-align: center;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .primary-button {
            background-color: #fff;
            color: #667eea;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .primary-button:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }

        .secondary-button {
            background-color: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .secondary-button:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* 通用section样式 */
        section {
            padding: 4rem 0;
        }

        .section-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        section h2 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            color: #333;
        }

        /* 关于我 */
        .about {
            background-color: #f9f9f9;
            color: #333;
        }

        .about p {
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto 2rem;
            text-align: center;
            color: #666;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .skill {
            background-color: #667eea;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* 项目 */
        .projects {
            background-color: #fff;
            color: #333;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .project-card {
            background-color: #f9f9f9;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .project-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #333;
        }

        .project-card p {
            color: #666;
            margin-bottom: 1.5rem;
        }

        .project-button {
            background-color: #667eea;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .project-button:hover {
            background-color: #5a67d8;
        }

        /* 联系我 */
        .contact {
            background-color: #f9f9f9;
            color: #333;
        }

        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 页脚 */
        .footer {
            background-color: #1a1a1a;
            color: #fff;
            padding: 2rem 0;
            margin-top: auto;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #646cff;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-content {
                flex-direction: column;
                gap: 1rem;
                padding: 0 1rem;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }

            .section-content {
                padding: 0 1rem;
            }

            section h2 {
                font-size: 2rem;
            }

            .footer-content {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-content">
                <h1 class="logo">个人网站</h1>
                <div class="nav-links">
                    <a href="#about">关于我</a>
                    <a href="#projects">项目</a>
                    <a href="#contact">联系我</a>
                    <button class="theme-toggle" onclick="toggleTheme()">🌞</button>
                </div>
            </div>
        </nav>

        <!-- 英雄区域 -->
        <section class="hero">
            <div class="hero-content">
                <h1>欢迎你主人</h1>
                <p>这是你的个人网站</p>
                <div class="hero-buttons">
                    <button class="primary-button">查看项目</button>
                    <button class="secondary-button">联系我</button>
                </div>
            </div>
        </section>

        <!-- 关于我 -->
        <section id="about" class="about">
            <div class="section-content">
                <h2>关于我</h2>
                <p>我是一名前端开发者，热爱创建美观且功能强大的网站。我擅长使用React、JavaScript和现代前端工具来构建用户友好的界面。</p>
                <div class="skills">
                    <div class="skill">React</div>
                    <div class="skill">JavaScript</div>
                    <div class="skill">HTML/CSS</div>
                    <div class="skill">Vite</div>
                    <div class="skill">Git</div>
                </div>
            </div>
        </section>

        <!-- 项目 -->
        <section id="projects" class="projects">
            <div class="section-content">
                <h2>我的项目</h2>
                <div class="project-grid">
                    <div class="project-card">
                        <h3>项目 1</h3>
                        <p>这是我的第一个项目，一个React应用程序。</p>
                        <button class="project-button">查看详情</button>
                    </div>
                    <div class="project-card">
                        <h3>项目 2</h3>
                        <p>这是我的第二个项目，一个响应式网站。</p>
                        <button class="project-button">查看详情</button>
                    </div>
                    <div class="project-card">
                        <h3>项目 3</h3>
                        <p>这是我的第三个项目，一个单页应用。</p>
                        <button class="project-button">查看详情</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 联系我 -->
        <section id="contact" class="contact">
            <div class="section-content">
                <h2>联系我</h2>
                <form class="contact-form">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" placeholder="请输入您的姓名" />
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" placeholder="请输入您的邮箱" />
                    </div>
                    <div class="form-group">
                        <label>消息</label>
                        <textarea placeholder="请输入您的消息" rows="4"></textarea>
                    </div>
                    <button type="submit" class="primary-button">发送消息</button>
                </form>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <div class="footer-content">
                <p>© 2026 个人网站. 保留所有权利.</p>
                <div class="social-links">
                    <a href="#">GitHub</a>
                    <a href="#">LinkedIn</a>
                    <a href="#">Twitter</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        let isDarkMode = true;
        
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            const root = document.documentElement;
            const themeToggle = document.querySelector('.theme-toggle');
            
            if (isDarkMode) {
                root.style.color = 'rgba(255, 255, 255, 0.87)';
                root.style.backgroundColor = '#242424';
                themeToggle.textContent = '🌞';
            } else {
                root.style.color = '#213547';
                root.style.backgroundColor = '#ffffff';
                themeToggle.textContent = '🌙';
            }
        }
    </script>
</body>
</html>
